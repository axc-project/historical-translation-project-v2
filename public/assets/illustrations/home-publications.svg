<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" fill="none">
  <!-- Background -->
  <circle cx="100" cy="90" r="75" fill="#0f1e3c" opacity="0.05"/>
  <!-- Stack of books -->
  <!-- Bottom book -->
  <rect x="50" y="115" width="100" height="18" rx="2" fill="#0f1e3c" opacity="0.85"/>
  <rect x="48" y="113" width="8" height="20" rx="1" fill="#b8860b"/>
  <line x1="56" y1="113" x2="56" y2="133" stroke="#b8860b" stroke-width="0.5" opacity="0.5"/>
  <!-- Middle book -->
  <rect x="55" y="95" width="94" height="18" rx="2" fill="#0f1e3c" opacity="0.7"/>
  <rect x="53" y="93" width="8" height="22" rx="1" fill="#b8860b" opacity="0.8"/>
  <!-- Top book angled slightly -->
  <g transform="rotate(-3, 100, 88)">
    <rect x="58" y="74" width="88" height="18" rx="2" fill="#b8860b" opacity="0.8"/>
    <rect x="56" y="72" width="8" height="22" rx="1" fill="#0f1e3c"/>
    <line x1="72" y1="80" x2="130" y2="80" stroke="#f8f3e8" stroke-width="0.8" opacity="0.5"/>
    <line x1="72" y1="84" x2="125" y2="84" stroke="#f8f3e8" stroke-width="0.8" opacity="0.5"/>
    <line x1="72" y1="88" x2="120" y2="88" stroke="#f8f3e8" stroke-width="0.5" opacity="0.3"/>
  </g>
  <!-- Quill pen -->
  <path d="M145 45 Q155 35 160 25 Q160 50 140 70 Q130 75 125 72 Q130 60 145 45Z" fill="#b8860b" opacity="0.5"/>
  <line x1="140" y1="70" x2="115" y2="95" stroke="#0f1e3c" stroke-width="1" opacity="0.5"/>
  <!-- Stars/sparkle -->
  <text x="75" y="55" font-size="10" fill="#b8860b" opacity="0.6">✦</text>
  <text x="55" y="75" font-size="7" fill="#b8860b" opacity="0.4">✦</text>
  <!-- Label -->
  <text x="100" y="158" font-family="Georgia, serif" font-size="9" fill="#b8860b" text-anchor="middle" letter-spacing="2">PUBLICATIONS</text>
</svg>
