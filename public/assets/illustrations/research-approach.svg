<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" fill="none">
  <circle cx="100" cy="90" r="75" fill="#0f1e3c" opacity="0.05"/>
  <!-- Timeline / bridge concept -->
  <!-- Scroll left (historical) -->
  <rect x="25" y="75" width="55" height="40" rx="3" fill="#f0e9d6" stroke="#b8860b" stroke-width="1.2"/>
  <rect x="22" y="73" width="8" height="44" rx="3" fill="#b8860b" opacity="0.4"/>
  <rect x="70" y="73" width="8" height="44" rx="3" fill="#b8860b" opacity="0.4"/>
  <line x1="30" y1="87" x2="67" y2="87" stroke="#0f1e3c" stroke-width="0.7" opacity="0.4"/>
  <line x1="30" y1="92" x2="67" y2="92" stroke="#0f1e3c" stroke-width="0.7" opacity="0.4"/>
  <line x1="30" y1="97" x2="60" y2="97" stroke="#0f1e3c" stroke-width="0.7" opacity="0.3"/>
  <line x1="30" y1="102" x2="65" y2="102" stroke="#0f1e3c" stroke-width="0.7" opacity="0.3"/>
  <!-- Arabic text hint -->
  <text x="52" y="84" font-family="serif" font-size="8" fill="#b8860b" text-anchor="middle" opacity="0.7">ابن سينا</text>
  <!-- Bridge arrow -->
  <path d="M85 95 L115 95" stroke="#b8860b" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#b8860b"/>
    </marker>
  </defs>
  <text x="100" y="90" font-family="sans-serif" font-size="7" fill="#b8860b" text-anchor="middle" opacity="0.7">synthesis</text>
  <!-- Molecule/modern right -->
  <circle cx="148" cy="82" r="10" fill="none" stroke="#0f1e3c" stroke-width="1.2"/>
  <circle cx="165" cy="95" r="7" fill="none" stroke="#0f1e3c" stroke-width="1.2"/>
  <circle cx="148" cy="108" r="8" fill="none" stroke="#0f1e3c" stroke-width="1.2"/>
  <circle cx="134" cy="97" r="6" fill="none" stroke="#b8860b" stroke-width="1.2"/>
  <line x1="148" y1="92" x2="158" y2="88" stroke="#0f1e3c" stroke-width="1"/>
  <line x1="148" y1="92" x2="148" y2="100" stroke="#0f1e3c" stroke-width="1"/>
  <line x1="148" y1="100" x2="158" y2="102" stroke="#0f1e3c" stroke-width="1"/>
  <line x1="148" y1="100" x2="140" y2="97" stroke="#b8860b" stroke-width="1"/>
  <!-- Dots at nodes -->
  <circle cx="148" cy="82" r="3" fill="#b8860b"/>
  <circle cx="165" cy="95" r="2.5" fill="#0f1e3c" opacity="0.5"/>
  <circle cx="148" cy="108" r="2.5" fill="#b8860b" opacity="0.6"/>
  <circle cx="134" cy="97" r="2" fill="#b8860b"/>
  <text x="100" y="158" font-family="Georgia, serif" font-size="9" fill="#b8860b" text-anchor="middle" letter-spacing="2">RESEARCH APPROACH</text>
</svg>
