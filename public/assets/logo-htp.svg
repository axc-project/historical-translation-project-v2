<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" fill="none">
  <!-- Crest mark -->
  <g transform="translate(0,4)">
    <!-- Outer shield -->
    <path d="M26 4 L42 4 L42 28 Q34 38 26 42 Q18 38 10 28 L10 4 Z" fill="none" stroke="#b8860b" stroke-width="1.2"/>
    <!-- Inner botanical cross -->
    <line x1="26" y1="8" x2="26" y2="36" stroke="#b8860b" stroke-width="0.8"/>
    <line x1="14" y1="18" x2="38" y2="18" stroke="#b8860b" stroke-width="0.8"/>
    <!-- Leaf motifs -->
    <ellipse cx="26" cy="12" rx="2.5" ry="4" fill="#b8860b" opacity="0.7" transform="rotate(-10,26,12)"/>
    <ellipse cx="26" cy="12" rx="2.5" ry="4" fill="#b8860b" opacity="0.5" transform="rotate(10,26,12)"/>
    <ellipse cx="20" cy="18" rx="4" ry="2.5" fill="#b8860b" opacity="0.7" transform="rotate(-10,20,18)"/>
    <ellipse cx="32" cy="18" rx="4" ry="2.5" fill="#b8860b" opacity="0.7" transform="rotate(10,32,18)"/>
    <ellipse cx="26" cy="30" rx="2" ry="3" fill="#b8860b" opacity="0.6"/>
    <!-- Top crown points -->
    <polygon points="16,4 20,0 24,4" fill="#b8860b" opacity="0.8"/>
    <polygon points="26,2 26,0 26,4" fill="#b8860b" opacity="0.6"/>
    <polygon points="28,4 32,0 36,4" fill="#b8860b" opacity="0.8"/>
  </g>
  <!-- Text -->
  <text x="52" y="28" font-family="Georgia, serif" font-size="15" font-weight="600" fill="#0f1e3c" letter-spacing="0.5">Historical Translation</text>
  <text x="52" y="44" font-family="Georgia, serif" font-size="12" fill="#b8860b" letter-spacing="2">PROJECT™</text>
  <!-- Thin rule under subtitle -->
  <line x1="52" y1="49" x2="230" y2="49" stroke="#b8860b" stroke-width="0.5" opacity="0.6"/>
</svg>
